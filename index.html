<!DOCTYPE html>
<html>
<head>
    <title>Hash-Based Dynamic Caesar Cipher</title>

    <style>
        body {
            font-family: "Segoe UI";
            background: #f2f6fb;
            margin: 0;
        }

        header {
            background: #2b6cb0;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        textarea {
            height: 120px;
        }

        button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .encrypt { background: #2b6cb0; }
        .decrypt { background: #4a5568; }
        .clear { background: #718096; }

        .status {
            background: #e2e8f0;
            padding: 8px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>Hash-Based Dynamic Caesar Cipher</header>

<div class="container">

    <div class="box">
        <h3>Message Configuration</h3>

        <label>Password:</label>
        <input type="password" id="password">

        
    </div>

    <label><b>Input Text:</b></label>
    <textarea id="inputText"></textarea>

    <div>
        <button class="encrypt" onclick="encryptText()">Encrypt</button>
        <button class="decrypt" onclick="decryptText()">Decrypt</button>
        <button class="clear" onclick="clearFields()">Clear</button>
    </div>

    <label><b>Output:</b></label>
    <textarea id="outputText" readonly></textarea>

</div>

<div class="status">Ready for encryption or decryption.</div>

<script>
/* ===== SHA-256 ===== */
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
    return new Uint8Array(hashBuffer);
}

/* ===== KEY GENERATION ===== */
function generateShift(keyStream, position) {
    let base = keyStream[position % keyStream.length];
    return (base + position) % 256;
}

/* ===== ENCRYPT ===== */
async function encryptText() {
    let password = document.getElementById("password").value;
    let text = document.getElementById("inputText").value;

    if (!password || !text) {
        alert("Password and plaintext required");
        return;
    }

    let keyStream = await sha256(password);
    let encoder = new TextEncoder();
    let bytes = encoder.encode(text);

    let result = [];

    for (let i = 0; i < bytes.length; i++) {
        let shift = generateShift(keyStream, i);
        result.push((bytes[i] + shift) % 256);
    }

    let base64 = btoa(String.fromCharCode(...result));
    document.getElementById("outputText").value = base64;
}

/* ===== DECRYPT ===== */
async function decryptText() {
    let password = document.getElementById("password").value;
    let text = document.getElementById("inputText").value;

    if (!password || !text) {
        alert("Password and ciphertext required");
        return;
    }

    try {
        let keyStream = await sha256(password);
        let binary = atob(text);
        let bytes = Uint8Array.from(binary, c => c.charCodeAt(0));

        let result = [];

        for (let i = 0; i < bytes.length; i++) {
            let shift = generateShift(keyStream, i);
            result.push((bytes[i] - shift + 256) % 256);
        }

        let decoder = new TextDecoder();
        document.getElementById("outputText").value = decoder.decode(new Uint8Array(result));

    } catch {
        alert("Invalid ciphertext or password");
    }
}

/* ===== CLEAR ===== */
function clearFields() {
    document.getElementById("password").value = "";
    document.getElementById("phone").value = "+";
    document.getElementById("inputText").value = "";
    document.getElementById("outputText").value = "";
}

// ===== AUTO LOAD FROM URL =====
window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");

    if (data) {
        document.getElementById("inputText").value = data;
    }
};
</script>

</body>
</html>
